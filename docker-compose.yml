services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: release_notifier
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

  app:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
      - "${GRPC_PORT:-50051}:50051"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/release_notifier}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-notifier@localhost}
      SMTP_PASS: ${SMTP_PASS:-notifier}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      SCAN_INTERVAL_MS: ${SCAN_INTERVAL_MS:-300000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GRPC_PORT: ${GRPC_PORT:-50051}

volumes:
  pgdata:
